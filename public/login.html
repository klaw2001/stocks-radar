<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Results Radar — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #161b27;
      --border: #1e2535;
      --text: #e2e8f0;
      --muted: #64748b;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --error-bg: #1c0a0a;
      --error-border: #7f1d1d;
      --error-text: #fca5a5;
      --radius: 8px;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --border: #e2e8f0;
        --text: #0f172a;
        --muted: #64748b;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .logo-text {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .logo-sub {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .error-banner {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
      border-radius: var(--radius);
      padding: 0.6rem 0.9rem;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      display: none;
    }

    .error-banner.show { display: block; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.35rem;
      letter-spacing: 0.02em;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.9rem;
      padding: 0.55rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1rem;
      font-family: inherit;
    }

    input:focus {
      border-color: var(--primary);
    }

    input::placeholder { color: var(--muted); }

    button[type="submit"] {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.65rem;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
      margin-top: 0.25rem;
    }

    button[type="submit"]:hover { background: var(--primary-hover); }
    button[type="submit"]:active { opacity: 0.9; }

    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📈</div>
      <div>
        <div class="logo-text">Results Radar</div>
        <div class="logo-sub">Equity Earnings Monitor</div>
      </div>
    </div>

    <h1>Sign in</h1>
    <p class="subtitle">Enter your credentials to access the dashboard.</p>

    <div class="error-banner" id="error-banner">
      Invalid username or password. Please try again.
    </div>

    <form method="POST" action="/login">
      <label for="username">Username</label>
      <input
        id="username"
        name="username"
        type="text"
        placeholder="your username"
        autocomplete="username"
        autocapitalize="none"
        required
        autofocus
      />

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        placeholder="••••••••"
        autocomplete="current-password"
        required
      />

      <button type="submit">Sign in →</button>
    </form>

    <p class="footer">Results Radar v2 &nbsp;·&nbsp; Internal tool</p>
  </div>

  <script>
    // Show error banner if redirected with ?error=1
    if (new URLSearchParams(location.search).get('error') === '1') {
      document.getElementById('error-banner').classList.add('show');
    }
  </script>
</body>
</html>
