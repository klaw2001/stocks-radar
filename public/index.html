<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fira+Code:wght@300..700&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Oxanium:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="./assets/index-CS3prfdc.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DQK7uJOA.css">
    <style>
      td:last-child {
        white-space: nowrap !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- ── AI Summary Sidebar ──────────────────────────────────────────── -->
    <div id="rr-overlay" onclick="rrCloseSidebar()" style="
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:9998;
    "></div>

    <div id="rr-sidebar" style="
      display:none; position:fixed; top:0; right:0; height:100vh; width:460px; max-width:92vw;
      background:#0f1117; border-left:1px solid #1e2535; z-index:9999;
      flex-direction:column; font-family:'Inter',sans-serif; box-shadow:-8px 0 32px rgba(0,0,0,.5);
    ">
      <!-- Header -->
      <div style="
        display:flex; align-items:flex-start; justify-content:space-between;
        padding:18px 20px 14px; border-bottom:1px solid #1e2535; flex-shrink:0;
      ">
        <div>
          <div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">AI Summary</div>
          <div id="rr-sb-company" style="font-size:16px;font-weight:600;color:#e2e8f0;line-height:1.3;"></div>
          <div id="rr-sb-date" style="font-size:12px;color:#64748b;margin-top:2px;"></div>
        </div>
        <button onclick="rrCloseSidebar()" style="
          background:none;border:1px solid #1e2535;color:#64748b;cursor:pointer;
          border-radius:6px;padding:5px 10px;font-size:18px;line-height:1;margin-left:12px;flex-shrink:0;
        ">✕</button>
      </div>

      <!-- Transcript link -->
      <div id="rr-sb-links" style="padding:10px 20px;border-bottom:1px solid #1e2535;display:none;gap:10px;flex-shrink:0;"></div>

      <!-- Body -->
      <div id="rr-sb-body" style="flex:1;overflow-y:auto;padding:20px;"></div>
    </div>

    <script>
    (function () {
      // ── Intercept fetch: cache events + trigger button injection ──────
      let rrEvents = [];
      const _origFetch = window.fetch.bind(window);
      window.fetch = async function (input, init) {
        const res = await _origFetch(input, init);
        const url = (typeof input === 'string' ? input : input?.url) || '';
        if (url.includes('/api/events') && !url.includes('/read')) {
          res.clone().json().then(data => {
            if (Array.isArray(data)) {
              rrEvents = data;
              setTimeout(rrInjectButtons, 300);
            }
          }).catch(() => {});
        }
        return res;
      };

      // ── Sidebar open/close ─────────────────────────────────────────────
      window.rrCloseSidebar = function () {
        document.getElementById('rr-sidebar').style.display = 'none';
        document.getElementById('rr-overlay').style.display = 'none';
      };

      window.rrOpenSidebar = function (eventId) {
        const evt = rrEvents.find(e => e.event_id === eventId);
        if (!evt) return;

        document.getElementById('rr-sb-company').textContent = evt.company_name;
        document.getElementById('rr-sb-date').textContent = evt.result_date;

        // Links bar
        const linksEl = document.getElementById('rr-sb-links');
        linksEl.innerHTML = '';
        if (evt.transcript_url || evt.transcript_summary_url) {
          linksEl.style.display = 'flex';
          if (evt.transcript_url) {
            linksEl.innerHTML += `<a href="${evt.transcript_url}" target="_blank" style="
              font-size:12px;color:#3b82f6;text-decoration:none;border:1px solid #1e3a5f;
              border-radius:5px;padding:4px 10px;
            ">📄 Full Transcript ↗</a>`;
          }
          if (evt.transcript_summary_url) {
            linksEl.innerHTML += `<a href="${evt.transcript_summary_url}" target="_blank" style="
              font-size:12px;color:#10b981;text-decoration:none;border:1px solid #064e3b;
              border-radius:5px;padding:4px 10px;
            ">🔗 Summary Page ↗</a>`;
          }
        } else {
          linksEl.style.display = 'none';
        }

        // Body
        document.getElementById('rr-sb-body').innerHTML = rrRenderSummary(evt.transcript_summary_text);

        document.getElementById('rr-sidebar').style.display = 'flex';
        document.getElementById('rr-overlay').style.display = 'block';
      };

      // ── Render transcript_summary_text ─────────────────────────────────
      // Format can be:
      //   (a) JSON object: {"Section Title": ["bullet1", "bullet2"], ...}
      //   (b) Plain markdown string
      function rrRenderSummary(raw) {
        if (!raw) return '<p style="color:#64748b;font-size:14px;">No summary available.</p>';

        // Try to parse as JSON
        let parsed = null;
        try { parsed = JSON.parse(raw); } catch {}

        if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
          return Object.entries(parsed).map(([section, content]) => {
            const items = Array.isArray(content) ? content : [String(content)];
            const bullets = items.map(item => {
              const html = String(item)
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>');
              return `<li style="margin-bottom:8px;line-height:1.55;color:#cbd5e1;">${html}</li>`;
            }).join('');
            return `
              <div style="margin-bottom:22px;">
                <div style="
                  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;
                  color:#64748b;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #1e2535;
                ">${rrEscape(section)}</div>
                <ul style="margin:0;padding-left:18px;">${bullets}</ul>
              </div>`;
          }).join('');
        }

        // Plain text / markdown fallback
        const html = String(raw)
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/\n\n/g, '</p><p style="margin:0 0 10px;color:#cbd5e1;font-size:14px;line-height:1.6;">')
          .replace(/\n/g, '<br>');
        return `<p style="margin:0 0 10px;color:#cbd5e1;font-size:14px;line-height:1.6;">${html}</p>`;
      }

      function rrEscape(s) {
        return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      }

      // ── Inject "Summary" button into table rows ────────────────────────
      const RR_ATTR = 'data-rr-injected';

      function rrInjectButtons() {
        const rows = document.querySelectorAll('tr:not([' + RR_ATTR + '])');
        rows.forEach(row => {
          const cells = row.querySelectorAll('td');
          if (cells.length < 2) return;

          // Company name is in 2nd td (index 1)
          const companyCell = cells[1];
          const companyName = companyCell?.textContent?.trim();
          if (!companyName) return;

          const evt = rrEvents.find(e =>
            e.company_name.toLowerCase() === companyName.toLowerCase()
          );
          if (!evt || !evt.transcript_summary_text) return;

          row.setAttribute(RR_ATTR, '1');

          // Inject button into last td (Actions column)
          const actionsCell = cells[cells.length - 1];
          if (!actionsCell) return;

          // Make actions cell a flex row so all icons align
          actionsCell.style.cssText += ';display:flex;align-items:center;gap:4px;flex-wrap:nowrap;';

          const btn = document.createElement('button');
          btn.title = 'View AI Summary';
          btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>`;
          btn.setAttribute('style', [
            'background:none', 'border:none', 'padding:0',
            'color:#64748b', 'cursor:pointer',
            'display:inline-flex', 'align-items:center', 'justify-content:center',
            'flex-shrink:0',
            'transition:color 0.15s',
          ].join(';'));
          btn.onmouseover = () => { btn.style.color = '#3b82f6'; };
          btn.onmouseout  = () => { btn.style.color = '#64748b'; };
          btn.onclick = (e) => { e.stopPropagation(); rrOpenSidebar(evt.event_id); };
          actionsCell.insertBefore(btn, actionsCell.firstChild);
        });
      }

      // Re-run on every React DOM update — all functions are idempotent
      const observer = new MutationObserver(() => {
        rrInjectButtons();
        rrAddGuideLink();
        rrAddRefreshButton();
        rrFixLabels();
      });
      observer.observe(document.body, { childList: true, subtree: true });

      // Close on Escape key
      document.addEventListener('keydown', e => { if (e.key === 'Escape') rrCloseSidebar(); });

      // ── Auto-apply admin key (removes need for manual entry) ──────────
      async function rrAutoAdmin() {
        try {
          const r = await fetch('/api/admin-token');
          if (!r.ok) return;
          const { key } = await r.json();
          window.__rrAdminKey = key;

          function tryApply() {
            const input = document.querySelector('input[type="password"]');
            if (!input) { setTimeout(tryApply, 600); return; }
            const setter = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value').set;
            setter.call(input, key);
            input.dispatchEvent(new Event('input', { bubbles: true }));
            setTimeout(() => {
              const btn = [...document.querySelectorAll('button')]
                .find(b => b.textContent.trim() === 'Apply');
              if (btn) {
                btn.click();
                // Hide the admin key row
                const row = input.closest('[class*="flex"][class*="items"]') ||
                            input.parentElement?.parentElement;
                if (row) row.style.display = 'none';
              }
            }, 200);
          }
          setTimeout(tryApply, 1200);
        } catch {}
      }
      rrAutoAdmin();

      // ── Replace "Screener" labels with "Stock Scan" ──────────────────
      function rrFixLabels() {
        document.querySelectorAll('*').forEach(el => {
          el.childNodes.forEach(node => {
            if (node.nodeType !== 3) return;
            if (node.textContent.includes('Screener polls every'))
              node.textContent = node.textContent.replace('Screener polls every', 'Stock Scan polls every');
            if (node.textContent.trim() === 'Open Screener')
              node.textContent = 'Open Stock Scan';
          });
        });
      }
      setTimeout(rrFixLabels, 800);

      // ── Add User Guide link to header ────────────────────────────────
      // Called by MutationObserver on every DOM change — idempotent via id check
      function rrAddGuideLink() {
        if (document.getElementById('rr-guide-link')) return;
        const header = document.querySelector('header') || document.querySelector('nav');
        if (!header) return; // observer will retry on next DOM change
        const a = document.createElement('a');
        a.id = 'rr-guide-link';
        a.href = '/userguide.html';
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = '📖 User Guide';
        a.style.cssText = [
          'font-size:12px', 'color:#64748b', 'text-decoration:none',
          'padding:4px 10px', 'border:1px solid #1e2535', 'border-radius:5px',
          'margin-left:12px', 'white-space:nowrap', 'flex-shrink:0',
          'display:inline-block',
        ].join(';');
        a.onmouseover = () => { a.style.color = '#94a3b8'; a.style.borderColor = '#334155'; };
        a.onmouseout  = () => { a.style.color = '#64748b'; a.style.borderColor = '#1e2535'; };
        header.appendChild(a);
      }
      // Initial attempt after React first renders
      setTimeout(rrAddGuideLink, 800);

      // ── Refresh All button ───────────────────────────────────────────────
      function rrAddRefreshButton() {
        if (document.getElementById('rr-refresh-btn')) return;
        const header = document.querySelector('header') || document.querySelector('nav');
        if (!header) return;

        const btn = document.createElement('button');
        btn.id = 'rr-refresh-btn';
        btn.title = 'Trigger a fresh poll of StockScans + Tijori now';
        btn.textContent = '⟳ Refresh';
        const baseStyle = [
          'font-size:12px', 'color:#10b981', 'background:none', 'cursor:pointer',
          'padding:4px 10px', 'border:1px solid #064e3b', 'border-radius:5px',
          'margin-left:8px', 'white-space:nowrap', 'flex-shrink:0',
          'display:inline-block', 'transition:color 0.15s,border-color 0.15s',
        ].join(';');
        btn.style.cssText = baseStyle;
        btn.onmouseover = () => { btn.style.color = '#34d399'; btn.style.borderColor = '#065f46'; };
        btn.onmouseout  = () => {
          if (!btn._loading) { btn.style.color = '#10b981'; btn.style.borderColor = '#064e3b'; }
        };

        btn.onclick = async () => {
          if (btn._loading) return;
          btn._loading = true;
          btn.textContent = '⟳ Polling…';
          btn.style.color = '#64748b';
          btn.style.borderColor = '#1e2535';
          btn.style.cursor = 'not-allowed';

          const adminKey = window.__rrAdminKey || '';
          const headers = { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey };

          try {
            const [r1, r2] = await Promise.all([
              fetch('/api/poll/screener', { method: 'POST', headers }),
              fetch('/api/poll/tijori',   { method: 'POST', headers }),
            ]);
            if (r1.ok && r2.ok) {
              btn.textContent = '✓ Polls triggered';
              btn.style.color = '#10b981';
              btn.style.borderColor = '#064e3b';
            } else {
              btn.textContent = '✗ Error';
              btn.style.color = '#ef4444';
              btn.style.borderColor = '#7f1d1d';
            }
          } catch {
            btn.textContent = '✗ Error';
            btn.style.color = '#ef4444';
            btn.style.borderColor = '#7f1d1d';
          }

          // Reset label after 4 seconds
          setTimeout(() => {
            btn._loading = false;
            btn.textContent = '⟳ Refresh';
            btn.style.color = '#10b981';
            btn.style.borderColor = '#064e3b';
            btn.style.cursor = 'pointer';
          }, 4000);
        };

        header.appendChild(btn);
      }
      setTimeout(rrAddRefreshButton, 800);
    })();
    </script>
  </body>
</html>
